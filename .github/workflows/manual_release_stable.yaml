name: Stable release

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: Release type
                required: true
                type: choice
                default: auto
                options:
                    - auto
                    - custom
                    - patch
                    - minor
                    - major
            custom_version:
                description: The custom version to bump to (only for "custom" type)
                required: false
                type: string
                default: ''

concurrency:
    group: release
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    code_checks:
        name: Code checks
        uses: ./.github/workflows/_check_code.yaml

    tests:
        name: Tests
        uses: ./.github/workflows/_tests.yaml

    release_metadata:
        name: Update release metadata
        needs: [code_checks, tests]
        permissions:
            contents: write
        uses: ./.github/workflows/_update_release_metadata.yaml
        secrets: inherit
        with:
            release_type: ${{ inputs.release_type }}
            custom_version: ${{ inputs.custom_version }}

    github_release:
        name: GitHub release
        needs: [release_metadata]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - name: GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release_metadata.outputs.tag_name }}
                  name: ${{ needs.release_metadata.outputs.version_number }}
                  target_commitish: ${{ needs.release_metadata.outputs.changelog_commitish }}
                  body: ${{ needs.release_metadata.outputs.release_notes }}

    npm_publish:
        name: NPM publish
        needs: [release_metadata]
        runs-on: ubuntu-latest
        steps:
            - name: Execute publish workflow
              uses: apify/workflows/execute-workflow@main
              with:
                  workflow: manual_publish_to_npm.yaml
                  inputs: >
                      {
                          "ref": "${{ needs.release_metadata.outputs.changelog_commitish }}",
                          "tag": "latest"
                      }
