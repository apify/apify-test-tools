name: CI (PR)

on:
    pull_request:

permissions:
    contents: read
    pull-requests: read

jobs:
    pr_title_check:
        name: PR title check
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v6.1.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    code_checks:
        name: Code checks
        uses: ./.github/workflows/_check_code.yaml

    tests:
        name: Tests
        uses: ./.github/workflows/_tests.yaml
